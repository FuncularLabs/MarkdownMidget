<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Markdown Midget mascot, sized to fill the whole tile: the dark Markdown
       badge IS the icon, with googly eyes up top and the M▼ mark below. -->

  <!-- Body fills the square (rounded), becoming the app tile. -->
  <rect x="6" y="6" width="244" height="244" rx="52" fill="#3B4252" stroke="#2E3440" stroke-width="6"/>

  <!-- Googly eyes in the upper third. -->
  <g>
    <circle cx="92" cy="84" r="36" fill="#ECEFF4" stroke="#2E3440" stroke-width="5"/>
    <circle cx="164" cy="84" r="36" fill="#ECEFF4" stroke="#2E3440" stroke-width="5"/>
    <circle cx="96" cy="96" r="15" fill="#2E3440"/>
    <circle cx="160" cy="96" r="15" fill="#2E3440"/>
    <circle cx="101" cy="90" r="5" fill="#ECEFF4"/>
    <circle cx="165" cy="90" r="5" fill="#ECEFF4"/>
  </g>

  <!-- The canonical Markdown mark (M + down arrow), white, in the lower half. -->
  <g transform="translate(38,128) scale(0.87)" fill="#ECEFF4">
    <path d="M30 98V30h20l20 25 20-25h20v68H90V59L70 84 50 59v39zm125 0l-30-33h20V30h20v35h20z"/>
  </g>
</svg>
