name: CI

on:
  push:
    branches: [master]
    paths-ignore:
      - '**/*.md'
      - 'art/**'
      - 'dist/**'
      - '.gitignore'
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'editor-src/package-lock.json'

      - name: Build editor bundle
        working-directory: editor-src
        run: |
          npm ci
          npm run build

      - name: Test editor (JS)
        working-directory: editor-src
        run: npm test

      - name: Restore
        run: dotnet restore MarkdownMidget.slnx

      - name: Build
        run: dotnet build MarkdownMidget.slnx -c Release --no-restore

      - name: Test
        run: dotnet test tests/MarkdownMidget.Tests/MarkdownMidget.Tests.csproj -c Release --no-build --verbosity normal
