name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (must already exist)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Determine tag
        id: tag
        shell: pwsh
        run: |
          $tag = if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            '${{ inputs.tag }}'
          } else {
            $env:GITHUB_REF_NAME
          }
          if (-not $tag) { throw "No tag provided." }
          $version = $tag -replace '^v',''
          # Base numeric version (strip anything after the first hyphen).
          $base = ($version -split '-')[0]
          $isPre = $version -match '-'
          "tag=$tag"          >> $env:GITHUB_OUTPUT
          "version=$version"  >> $env:GITHUB_OUTPUT
          "base=$base"        >> $env:GITHUB_OUTPUT
          "prerelease=$($isPre.ToString().ToLower())" >> $env:GITHUB_OUTPUT
          "Building $tag (base=$base, prerelease=$isPre)"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'editor-src/package-lock.json'

      - name: Build editor bundle
        working-directory: editor-src
        run: |
          npm ci
          npm run build

      - name: Test editor (JS)
        working-directory: editor-src
        run: npm test

      - name: Restore
        run: dotnet restore MarkdownMidget.slnx

      - name: Test
        run: dotnet test tests/MarkdownMidget.Tests/MarkdownMidget.Tests.csproj -c Release --verbosity minimal

      - name: Publish framework-dependent
        shell: pwsh
        run: |
          dotnet publish src/MarkdownMidget/MarkdownMidget.csproj `
            -p:PublishProfile=win-x64-fxdependent `
            -p:Version=${{ steps.tag.outputs.base }} `
            -p:InformationalVersion=${{ steps.tag.outputs.version }} `
            --nologo

      - name: Stage asset
        id: stage
        shell: pwsh
        run: |
          $src = "src/MarkdownMidget/bin/Release/publish/framework-dependent/MarkdownMidget.exe"
          if (-not (Test-Path $src)) { throw "Published exe not found at $src" }
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $dest = "dist/MarkdownMidget-${{ steps.tag.outputs.tag }}-win-x64-net10.exe"
          Copy-Item $src $dest -Force
          $size = (Get-Item $dest).Length
          "asset=$dest" >> $env:GITHUB_OUTPUT
          "sizeMB=$([Math]::Round($size / 1MB, 2))" >> $env:GITHUB_OUTPUT

      # ===== Authenticode signing via Azure Artifact Signing =====
      # Uses the SP whose credentials are in AZURE_CLIENT_ID/TENANT/SECRET secrets.
      # azuretrustedsigntool wraps signtool.exe + the CodeSigning dlib; it picks
      # up creds via DefaultAzureCredential (which reads the AZURE_* env vars).

      - name: Install azuretrustedsigntool
        run: dotnet tool install --global azuretrustedsigntool

      - name: Locate signtool.exe (Windows SDK, preinstalled on windows-latest)
        id: signtool
        shell: pwsh
        run: |
          $tool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" `
                    -Recurse -Filter signtool.exe -ErrorAction SilentlyContinue |
                  Where-Object { $_.FullName -like "*\x64\*" } |
                  Sort-Object FullName -Descending |
                  Select-Object -First 1
          if (-not $tool) { throw "signtool.exe not found on runner" }
          Write-Host "signtool: $($tool.FullName)"
          "path=$($tool.FullName)" >> $env:GITHUB_OUTPUT

      - name: Sign the exe (Azure Artifact Signing)
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        shell: pwsh
        run: |
          # NB: --signtoolexe long form: the tool has a bug where `-e` is
          # registered twice (both --signtoolexe and --excludefilelist), so any
          # short-form `-e` triggers "Sequence contains more than one matching
          # element" in the CommandLine parser. Long form is unambiguous.
          azuretrustedsigntool sign `
            --file "${{ steps.stage.outputs.asset }}" `
            --accountname func-az-artifact-signing `
            --profilename funcular-labs-public-trust `
            --trustedendpoint https://cus.codesigning.azure.net/ `
            --signtoolexe "${{ steps.signtool.outputs.path }}" `
            --description "Markdown Midget" `
            --verbose

      - name: Verify Authenticode signature
        shell: pwsh
        run: |
          & "${{ steps.signtool.outputs.path }}" verify /pa /v "${{ steps.stage.outputs.asset }}"
          if ($LASTEXITCODE -ne 0) { throw "Authenticode verify failed (exit $LASTEXITCODE)" }
          $sig = Get-AuthenticodeSignature "${{ steps.stage.outputs.asset }}"
          Write-Host "Status:  $($sig.Status)"
          Write-Host "Subject: $($sig.SignerCertificate.Subject)"
          if ($sig.Status -ne 'Valid') { throw "Signature status is $($sig.Status), expected Valid" }

      - name: Build release notes from CHANGELOG
        id: notes
        shell: pwsh
        run: |
          $version = "${{ steps.tag.outputs.version }}"
          $tag = "${{ steps.tag.outputs.tag }}"
          $sizeMB = "${{ steps.stage.outputs.sizeMB }}"

          $lines = Get-Content CHANGELOG.md
          $start = -1
          $end = $lines.Count
          for ($i = 0; $i -lt $lines.Count; $i++) {
            if ($start -lt 0 -and $lines[$i] -match "^##\s+\[$([regex]::Escape($version))\]") {
              $start = $i + 1
              continue
            }
            if ($start -ge 0 -and $lines[$i] -match '^##\s+\[') {
              $end = $i; break
            }
          }
          if ($start -lt 0) {
            Write-Warning "No CHANGELOG entry for [$version]; using generic notes."
            $body = "Alpha update. See [CHANGELOG.md](https://github.com/FuncularLabs/MarkdownMidget/blob/master/CHANGELOG.md) for full history."
          } else {
            $body = ($lines[$start..($end-1)] -join "`n").TrimEnd()
            $body += "`n`nSee [CHANGELOG.md](https://github.com/FuncularLabs/MarkdownMidget/blob/master/CHANGELOG.md) for full history."
          }

          $boilerplate = @(
            ''
            '## Download'
            ''
            "**``MarkdownMidget-$tag-win-x64-net10.exe``** — single-file, framework-dependent build (~$sizeMB MB)."
            ''
            '## Requirements'
            ''
            '- **Windows 10/11 (x64)**'
            '- **.NET 10 Desktop Runtime** — https://dotnet.microsoft.com/download/dotnet/10.0'
            '- **Microsoft Edge WebView2 Runtime** — preinstalled on Windows 11; otherwise a free download from Microsoft.'
            ''
            '## Notes'
            ''
            '- The download is **signed** by Funcular Labs via Azure Artifact Signing (Authenticode). If Windows SmartScreen warns on a very new release, the reputation graph builds up quickly for signed installers.'
            '- Settings/recent files live under `%LocalAppData%\MarkdownMidget`.'
          ) -join "`n"

          $full = $body + "`n" + $boilerplate
          Set-Content -Path release-notes.md -Value $full -Encoding utf8
          "Extracted notes (first 500 chars):"
          $full.Substring(0, [Math]::Min(500, $full.Length))

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Markdown Midget ${{ steps.tag.outputs.tag }}
          body_path: release-notes.md
          prerelease: ${{ steps.tag.outputs.prerelease == 'true' }}
          files: ${{ steps.stage.outputs.asset }}
          fail_on_unmatched_files: true
